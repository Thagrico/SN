<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bản đồ sức khỏe đất</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
html,body{margin:0;padding:0;height:100%;}
#map{width:100%;height:100vh;}
.popup-table{border-collapse:collapse;width:100%;}
.popup-table td{border:1px solid #ddd;padding:4px 6px;font-size:12px;}
.text-label{background:transparent;border:none;box-shadow:none;font-weight:bold;font-size:16px;color:#ff0000;}

/* Thêm scroll nếu popup quá cao */
.leaflet-popup-content-wrapper {
    max-height: 300px;
    overflow-y: auto;
}
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);

let allLayers = [];

// Hàm popup hiển thị thông tin thửa
function createPopup(properties){
    let html = '<table class="popup-table">';
    for(const key in properties){
        html += `<tr><td><b>${key}</b></td><td>${properties[key]}</td></tr>`;
    }
    html += '</table>';
    return html;
}

// ==========================
// THỬA ĐẤT
// ==========================
fetch('Thua.geojson')
.then(r=>r.json())
.then(data=>{
    const layer = L.geoJSON(data,{
        style: feature => {
            let fill = '#f5f5f5';
            switch(feature.properties.CHAT_LUONG_VUON){
                case 'TOT': fill='#c9b3ff'; break;
                case 'TB': fill='#b3ffb3'; break;
                case 'KEM': fill='#fff5b3'; break;
                case 'TRONG MOI': fill='#ffb3b3'; break;
            }
            return {color:'#bbbbbb',weight:1,fillColor:fill,fillOpacity:0.5};
        },
        onEachFeature: (feature,layer)=>{
            layer.bindPopup(createPopup(feature.properties));

            // Hiển thị số lô nếu có
            if(feature.properties.TEN_LO){
                let center = layer.getBounds().getCenter();
                L.circleMarker(center,{
                    radius: 12,
                    color: getXNColor(feature.properties.XN),
                    weight: 2,
                    fillColor: getXNColor(feature.properties.XN),
                    fillOpacity: 1
                }).addTo(map)
                .bindTooltip(feature.properties.TEN_LO,{
                    permanent:true,
                    direction:'center',
                    className:'text-label'
                });
            }
        }
    }).addTo(map);

    allLayers.push(layer);
    zoomAll();
});

// ==========================
// RANH LÔ
// ==========================
fetch('Ranh_lo.geojson')
.then(r=>r.json())
.then(data=>{
    const layer = L.geoJSON(data,{
        style:{color:'#666666',weight:2,fillOpacity:0}
    }).addTo(map);
    allLayers.push(layer);
    layer.bringToFront();
    zoomAll();
});

// ==========================
// RANH XN
// ==========================
fetch('Ranh_xn.geojson')
.then(r=>r.json())
.then(data=>{
    const layer = L.geoJSON(data,{
        style:{color:'#ff0000',weight:4,fillOpacity:0}
    }).addTo(map);
    allLayers.push(layer);
    layer.bringToFront();
    zoomAll();
});

// ==========================
// TEXT XN
// ==========================
fetch('Text_xn.geojson')
.then(r=>r.json())
.then(data=>{
    const textLayer = L.geoJSON(data,{
        pointToLayer: (feature,latlng)=>{
            let text = '';
            for(const k in feature.properties){ if(feature.properties[k]){text=feature.properties[k]; break;} }
            return L.marker(latlng,{
                icon:L.divIcon({
                    className:'text-label',
                    html:text,
                    iconSize:null
                })
            });
        }
    }).addTo(map);
    textLayer.bringToFront();
    allLayers.push(textLayer);
    zoomAll();
});

// ==========================
// Hàm xác định màu theo XN
// ==========================
function getXNColor(xn){
    switch(xn){
        case 'NSA1': return '#1f77b4';
        case 'NSA2': return '#2ca02c';
        case 'NSA3': return '#9467bd';
        case 'BSA1': return '#ff7f0e';
        case 'BSA2': return '#8c564b';
        case 'NK1': return '#e377c2';
        case 'PV1': return '#7f7f7f';
        default: return '#000000';
    }
}

// ==========================
// ZOOM TOÀN BỘ
// ==========================
function zoomAll(){
    if(allLayers.length===0) return;
    try{
        const group = L.featureGroup(allLayers);
        const bounds = group.getBounds();
        if(bounds.isValid()) map.fitBounds(bounds,{padding:[20,20]});
    }catch(err){}
}

</script>
</body>
</html>
