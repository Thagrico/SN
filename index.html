```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plantation Quality Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
}

#map{
    width:100%;
    height:100vh;
}

.popup-table{
    border-collapse:collapse;
    width:100%;
}

.popup-table td{
    border:1px solid #ddd;
    padding:4px 6px;
    font-size:12px;
    vertical-align:top;
}

.legend{
    background:white;
    padding:10px;
    border-radius:8px;
    box-shadow:0 0 8px rgba(0,0,0,.25);
    line-height:22px;
    font-size:13px;
}
.leaflet-interactive{

    filter:
        drop-shadow(0px 1px 0px rgba(255,255,255,.65))
        drop-shadow(0px 2px 2px rgba(0,0,0,.18));

    transition:.25s;
}

.leaflet-interactive:hover{

    filter:
        brightness(108%)
        drop-shadow(0 0 8px rgba(255,255,255,.9));

}
.xn-label{
    color:#8B0000;
    font-size:20px;
    font-weight:700;
    text-shadow:
        1px 1px 2px white,
        -1px -1px 2px white,
        1px -1px 2px white,
        -1px 1px 2px white;
}
.lo-label{
    width:22px;
    height:22px;
    line-height:22px;
    text-align:center;

    background:rgba(255,255,255,0.85);
    border:1.5px solid #003366;
    border-radius:50%;

    color:#003366;
    font-size:11px;
    font-weight:700;

    box-sizing:border-box;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map');

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);


// =====================
// LEGEND
// =====================

const legend = L.control({position:'bottomright'});

legend.onAdd = function(){

    const div = L.DomUtil.create('div','legend');

div.innerHTML = `
<b style="font-size:14px;">Chất lượng vườn</b><br>
<small style="color:#666;">
Plantation Quality
</small><br><br>

<span style="display:inline-block;width:14px;height:14px;background:#2E7D32;border:1px solid #666;"></span>
 Tốt<br>
 <small style="color:#666;">Good</small><br><br>

<span style="display:inline-block;width:14px;height:14px;background:#7CB342;border:1px solid #666;"></span>
 Trung bình<br>
 <small style="color:#666;">Fair</small><br><br>

<span style="display:inline-block;width:14px;height:14px;background:#B59B3A;border:1px solid #666;"></span>
 Kém<br>
 <small style="color:#666;">Poor</small><br><br>

<span style="display:inline-block;width:14px;height:14px;background:#D8F0C8;border:1px solid #666;"></span>
 Trồng mới<br>
 <small style="color:#666;">New Plantation</small><br><br>

<span style="display:inline-block;width:14px;height:14px;background:#D9D9D9;border:1px solid #666;"></span>
 Không có dữ liệu<br>
 <small style="color:#666;">No Data</small>
`;
return div;
};
legend.addTo(map);


// =====================
// POPUP
// =====================

function createPopup(properties){

    let html = `
    <div style="
        max-height:350px;
        overflow-y:auto;
        overflow-x:hidden;
    ">
    <table class="popup-table">
    `;

    Object.entries(properties).forEach(([key,value])=>{

        if(value !== null && value !== ''){

            html += `
            <tr>
                <td><b>${key}</b></td>
                <td>${value}</td>
            </tr>
            `;
        }
    });

    html += `
    </table>
    </div>
    `;

    return html;
}


// =====================
// COLOR
// =====================

function getQualityColor(feature){

    const props = feature.properties;

    const quality = String(
        props["Chất lượng vườn (Plantation Quality)"] ||
        props["Plantation Quality"] ||
        props["CHAT_LUONG_VUON"] ||
        props["CL_VUON"] ||
        ''
    ).toLowerCase();

    // Tốt
    if(
        quality.includes('tốt') ||
        quality.includes('tot') ||
        quality.includes('good')
    ){
      return '#2E7D32';
    }

    // Trung bình
    if(
        quality.includes('trung bình') ||
        quality.includes('trung binh') ||
        quality.includes('fair') ||
        quality === 'tb'
    ){
        return '#7CB342';
    }

    // Kém
    if(
        quality.includes('kém') ||
        quality.includes('kem') ||
        quality.includes('poor')
    ){
       return '#B59B3A';
    }

    // Trồng mới 
    if(
        quality.includes('trồng mới') ||
        quality.includes('trong moi') ||
        quality.includes('new') ||
        quality === 'tm'
    ){
        return '#D8F0C8';
    }

    // Không có dữ liệu
    return '#D9D9D9';
}


// =====================
// LOAD GEOJSON
// =====================

fetch('Thua.geojson')
.then(r => r.json())
.then(data => {

    const layer = L.geoJSON(data,{

      style: feature => ({

    color:'#FFFFFF',

    weight:1.2,

    opacity:1,

    fillColor:getQualityColor(feature),

    fillOpacity:0.93,

    lineJoin:'round',

    lineCap:'round'

}),

        onEachFeature:(feature,layer)=>{

            layer.bindPopup(
                createPopup(feature.properties)
            );

        }

    }).addTo(map);

    map.fitBounds(layer.getBounds());

})
.catch(err => {
 console.error(err);

    alert(
        'Không tìm thấy file Thua.geojson'
    );

});
// =====================
// LINE LO
// =====================

fetch('Line_lo.geojson')
.then(r => r.json())
.then(data => {

    L.geoJSON(data,{
       style:{
    color:'#3B82F6',
    weight:2.2,
    opacity:0.9
}
    }).addTo(map);

})
.catch(err => console.log(err));
// =====================
// RANH XN
// =====================

fetch('Ranh_xn.geojson')
.then(r => r.json())
.then(data => {

    const ranhXN = L.geoJSON(data,{
        style:{
            color:'#8B0000',
            weight:5,
            opacity:1,
            fill:false
        }
    }).addTo(map);

    ranhXN.bringToFront();

})
.catch(err => console.log(err));
// =====================
// TEN XN
// =====================

fetch('Ten_xn.geojson')
.then(r => r.json())
.then(data => {

    const tenXN = L.geoJSON(data,{
        pointToLayer:(feature,latlng)=>{

            return L.marker(latlng,{
                icon:L.divIcon({
                    className:'xn-label',
                    html:feature.properties.Name || '',
                    iconSize:[120,30]
                })
            });

        }
    }).addTo(map);

    tenXN.bringToFront();

})
.catch(err => console.log(err));  
// =====================
// TEXT LO
// =====================

fetch('Text_lo.geojson')
.then(r => r.json())
.then(data => {

    const textLo = L.geoJSON(data,{
        pointToLayer:(feature,latlng)=>{

            return L.marker(latlng,{
                icon:L.divIcon({
                    className:'lo-label',
                    html:feature.properties.Name || '',
                    iconSize:[22,22]
                })
            });

        }
    }).addTo(map);

    textLo.bringToFront();

})
.catch(err => console.log(err));
</script>

</body>
</html>
